{% extends "base.html" %}

{% block title %}Verificação 2FA — LIMS{% endblock %}

{% block content %}
<div class="card">
    <h1>Autenticação em dois fatores</h1>
    <p style="color:#6b7280; font-size:.9rem; margin-bottom:1.25rem;">
        Digite o código de 6 dígitos do seu aplicativo autenticador.
    </p>

    <div id="alert" class="alert" style="display:none;"></div>

    <form id="twofa-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="token">Código 2FA</label>
            <input type="text" id="token" name="token"
                   autocomplete="one-time-code"
                   placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" required>
        </div>
        <button type="submit" id="submit-btn">Verificar</button>
    </form>

    <p class="text-muted text-center">
        <a href="{% url 'frontend-login' %}">Voltar ao login</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    const form = document.getElementById('twofa-form');
    const alertBox = document.getElementById('alert');
    const submitBtn = document.getElementById('submit-btn');

    function showAlert(msg, type = 'error') {
        alertBox.textContent = msg;
        alertBox.className = 'alert alert-' + type;
        alertBox.style.display = 'block';
    }

    function getCsrf() {
        return document.querySelector('[name=csrfmiddlewaretoken]').value;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.textContent = 'Verificando…';
        alertBox.style.display = 'none';

        const username = sessionStorage.getItem('2fa_username');
        const token = document.getElementById('token').value.trim();

        const body = { token };
        if (username) body.username = username;

        let res;
        try {
            res = await fetch('/api/users/login/verify/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrf(),
                },
                body: JSON.stringify(body),
            });
        } catch {
            showAlert('Erro de conexão. Verifique sua internet e tente novamente.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Verificar';
            return;
        }

        try {
            const data = await res.json();

            if (!res.ok) {
                showAlert(data.detail || data.non_field_errors?.[0] || 'Código inválido ou expirado.');
                return;
            }

            sessionStorage.removeItem('2fa_username');
            sessionStorage.setItem('access_token', data.access);
            sessionStorage.setItem('refresh_token', data.refresh);
            window.location.href = "{% url 'frontend-dashboard' %}";
        } catch {
            showAlert(`Erro inesperado do servidor (HTTP ${res.status}). Tente novamente.`);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Verificar';
        }
    });
</script>
{% endblock %}
