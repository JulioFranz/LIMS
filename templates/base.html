<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LIMS{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a1a2e;
            color: #fff;
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header .brand {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: .05em;
            text-decoration: none;
            color: #fff;
        }

        header nav a {
            color: #c9d1e0;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: .9rem;
        }

        header nav a:hover { color: #fff; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }

        .card h1 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            margin-bottom: .35rem;
            color: #444;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: .65rem .85rem;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s;
        }

        input:focus { border-color: #4f46e5; }

        button[type="submit"], .btn {
            display: block;
            width: 100%;
            padding: .75rem;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.25rem;
            transition: background .2s;
            text-align: center;
            text-decoration: none;
        }

        button[type="submit"]:hover, .btn:hover { background: #4338ca; }
        button:disabled { background: #a5b4fc; cursor: not-allowed; }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
            margin-top: .75rem;
        }

        .btn-secondary:hover { background: #d1d5db; }

        .btn-danger {
            background: #dc2626;
            margin-top: .75rem;
        }

        .btn-danger:hover { background: #b91c1c; }

        .alert {
            padding: .75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: .9rem;
        }

        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .alert-info { background: #e0f2fe; color: #075985; border: 1px solid #7dd3fc; }

        .text-center { text-align: center; }
        .text-muted { color: #6b7280; font-size: .875rem; margin-top: 1rem; }
        .text-muted a { color: #4f46e5; text-decoration: none; }
        .text-muted a:hover { text-decoration: underline; }

        footer {
            text-align: center;
            padding: 1.25rem;
            font-size: .8rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <header>
        <a class="brand" href="/">LIMS</a>
        <nav>{% block nav %}{% endblock %}</nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>&copy; 2026 LIMS</footer>

    {% block scripts %}{% endblock %}
</body>
</html>
