{% extends "base.html" %}
{% block title %}Recuperar senha{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Recuperar senha</h1>
    <p>Informe o e-mail cadastrado. Se houver uma conta associada, enviaremos um link para redefinição de senha.</p>

    <form id="reset-request-form" novalidate>
        {% csrf_token %}
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autocomplete="email">

        <button type="submit">Enviar link de recuperação</button>
    </form>

    <p id="message" role="status" aria-live="polite"></p>

    <p><a href="{% url 'frontend-login' %}">Voltar ao login</a></p>
</div>

<script>
document.getElementById('reset-request-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const msg = document.getElementById('message');
    msg.textContent = 'Enviando...';

    try {
        const response = await fetch('/api/users/password-reset/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
            },
            body: JSON.stringify({ email: email }),
        });

        const data = await response.json();

        if (response.status === 429) {
            msg.textContent = 'Muitas solicitações. Tente novamente mais tarde.';
            return;
        }

        // Resposta genérica — exibir sempre a mesma mensagem ao usuário.
        msg.textContent = data.detail || 'Solicitação recebida.';
        document.getElementById('reset-request-form').reset();
    } catch (err) {
        msg.textContent = 'Erro ao processar a solicitação. Tente novamente.';
    }
});
</script>
{% endblock %}
