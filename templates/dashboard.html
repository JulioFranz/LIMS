{% extends "base.html" %}

{% block title %}Dashboard — LIMS{% endblock %}

{% block nav %}
<span id="nav-user" style="color:#c9d1e0; font-size:.9rem;"></span>
{% endblock %}

{% block content %}
<div class="card" style="max-width:520px;">
    <h1>Dashboard</h1>

    <div id="alert" class="alert" style="display:none;"></div>

    <div id="user-info" style="margin: 1.25rem 0; padding: 1rem; background:#f8fafc; border-radius:8px; font-size:.9rem; line-height:1.8;">
    </div>

    <button class="btn btn-danger" id="logout-btn">Sair</button>
</div>
{% endblock %}

{% block scripts %}
<script>
    const alertBox = document.getElementById('alert');
    const userInfo = document.getElementById('user-info');
    const logoutBtn = document.getElementById('logout-btn');
    const navUser = document.getElementById('nav-user');

    function showAlert(msg, type = 'error') {
        alertBox.textContent = msg;
        alertBox.className = 'alert alert-' + type;
        alertBox.style.display = 'block';
    }

    function getCsrf() {
        return document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
    }

    function parseJwt(token) {
        try {
            const payload = token.split('.')[1];
            return JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
        } catch {
            return null;
        }
    }

    function formatDate(ts) {
        return new Date(ts * 1000).toLocaleString('pt-BR');
    }

    const accessToken = sessionStorage.getItem('access_token');

    if (!accessToken) {
        window.location.href = "{% url 'frontend-login' %}";
    } else {
        const payload = parseJwt(accessToken);
        if (payload) {
            navUser.textContent = payload.username || payload.user_id || 'Usuário';
            userInfo.innerHTML =
                '<strong>Usuário:</strong> ' + (payload.username || payload.user_id || '—') + '<br>' +
                '<strong>Token expira em:</strong> ' + (payload.exp ? formatDate(payload.exp) : '—') + '<br>' +
                '<strong>Emitido em:</strong> ' + (payload.iat ? formatDate(payload.iat) : '—');
        } else {
            userInfo.textContent = 'Sessão ativa.';
        }
    }

    logoutBtn.addEventListener('click', async () => {
        logoutBtn.disabled = true;
        logoutBtn.textContent = 'Saindo…';

        const refresh = sessionStorage.getItem('refresh_token');

        try {
            await fetch('/api/users/logout/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + accessToken,
                    'X-CSRFToken': getCsrf(),
                },
                body: JSON.stringify({ refresh }),
            });
        } catch { /* ignora erros de rede no logout */ }

        sessionStorage.removeItem('access_token');
        sessionStorage.removeItem('refresh_token');
        window.location.href = "{% url 'frontend-login' %}";
    });
</script>
{% csrf_token %}
{% endblock %}
