{% extends "base.html" %}

{% block title %}Registrar — LIMS{% endblock %}

{% block content %}
<div class="card">
    <h1>Criar conta</h1>

    <div id="alert" class="alert" style="display:none;"></div>

    <form id="register-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required>
        </div>
        <button type="submit" id="submit-btn">Criar conta</button>
    </form>

    <p class="text-muted text-center">
        Já tem conta? <a href="{% url 'frontend-login' %}">Entrar</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    const form = document.getElementById('register-form');
    const alertBox = document.getElementById('alert');
    const submitBtn = document.getElementById('submit-btn');

    function showAlert(msg, type = 'error') {
        alertBox.textContent = msg;
        alertBox.className = 'alert alert-' + type;
        alertBox.style.display = 'block';
    }

    function getCsrf() {
        return document.querySelector('[name=csrfmiddlewaretoken]').value;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.textContent = 'Criando…';
        alertBox.style.display = 'none';

        const body = {
            username: document.getElementById('username').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
        };

        try {
            const res = await fetch('/api/users/register/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrf(),
                },
                body: JSON.stringify(body),
            });

            const data = await res.json();

            if (!res.ok) {
                const firstError = Object.values(data).flat()[0];
                showAlert(firstError || 'Erro ao criar conta.');
                return;
            }

            showAlert('Conta criada! Redirecionando para verificação de e-mail…', 'success');
            form.reset();
            setTimeout(() => { window.location.href = "{% url 'frontend-verify-email' %}"; }, 2000);
        } catch {
            showAlert('Erro de conexão. Tente novamente.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Criar conta';
        }
    });
</script>
{% endblock %}
