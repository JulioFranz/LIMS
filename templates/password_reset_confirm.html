{% extends "base.html" %}
{% block title %}Definir nova senha{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Definir nova senha</h1>

    {% if not uid or not token %}
        <p class="error">Link inválido ou expirado. <a href="{% url 'frontend-password-reset-request' %}">Solicitar novo link</a>.</p>
    {% else %}
        <form id="reset-confirm-form" novalidate>
            {% csrf_token %}
            <input type="hidden" id="uid" value="{{ uid }}">
            <input type="hidden" id="token" value="{{ token }}">

            <label for="new_password">Nova senha</label>
            <input type="password" id="new_password" name="new_password" minlength="8" required autocomplete="new-password">

            <label for="new_password_confirm">Confirme a nova senha</label>
            <input type="password" id="new_password_confirm" name="new_password_confirm" minlength="8" required autocomplete="new-password">

            <button type="submit">Redefinir senha</button>
        </form>

        <p id="message" role="status" aria-live="polite"></p>
    {% endif %}

    <p><a href="{% url 'frontend-login' %}">Voltar ao login</a></p>
</div>

<script>
const form = document.getElementById('reset-confirm-form');
if (form) {
    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const msg = document.getElementById('message');

        const newPassword = document.getElementById('new_password').value;
        const newPasswordConfirm = document.getElementById('new_password_confirm').value;

        if (newPassword !== newPasswordConfirm) {
            msg.textContent = 'As senhas não coincidem.';
            return;
        }

        msg.textContent = 'Processando...';

        try {
            const response = await fetch('/api/users/password-reset/confirm/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                },
                body: JSON.stringify({
                    uid: document.getElementById('uid').value,
                    token: document.getElementById('token').value,
                    new_password: newPassword,
                }),
            });

            const data = await response.json();

            if (response.ok) {
                msg.textContent = data.detail + ' Redirecionando para o login...';
                setTimeout(() => { window.location.href = "{% url 'frontend-login' %}"; }, 2500);
            } else if (response.status === 429) {
                msg.textContent = 'Muitas tentativas. Tente novamente mais tarde.';
            } else {
                msg.textContent = data.detail || 'Não foi possível redefinir a senha.';
            }
        } catch (err) {
            msg.textContent = 'Erro ao processar a solicitação. Tente novamente.';
        }
    });
}
</script>
{% endblock %}
